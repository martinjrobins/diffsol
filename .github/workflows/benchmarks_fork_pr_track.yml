name: Fork PR Benchmarks Track

on:
  workflow_run:
    workflows: [Fork PR Benchmarks Run]
    types: [completed]

jobs:
  track_fork_pr:
    name: Track Fork PR Benchmarks with Bencher
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      checks: write
      pull-requests: write
    runs-on: ubuntu-latest
    env:
      BENCHMARK_RESULTS: benchmark_results.txt
      PR_EVENT: event.json
    steps:
      - name: Download Benchmark Results
        uses: dawidd6/action-download-artifact@v6
        with:
          name: ${{ env.BENCHMARK_RESULTS }}
          run_id: ${{ github.event.workflow_run.id }}

      - name: Download PR Event
        uses: dawidd6/action-download-artifact@v6
        with:
          name: ${{ env.PR_EVENT }}
          run_id: ${{ github.event.workflow_run.id }}

      - name: Export PR Event Data
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const prEvent = JSON.parse(fs.readFileSync(process.env.PR_EVENT, {encoding: 'utf8'}));
            core.exportVariable('PR_HEAD', prEvent.pull_request.head.ref);
            core.exportVariable('PR_HEAD_SHA', prEvent.pull_request.head.sha);
            core.exportVariable('PR_BASE', prEvent.pull_request.base.ref);
            core.exportVariable('PR_BASE_SHA', prEvent.pull_request.base.sha);
            core.exportVariable('PR_NUMBER', prEvent.number);

      - uses: bencherdev/bencher@main

      - name: Track benchmarks with Bencher
        run: |
          bencher run \
            --project diffsol \
            --key '${{ secrets.BENCHER_API_KEY }}' \
            --branch "$PR_HEAD" \
            --hash "$PR_HEAD_SHA" \
            --start-point "$PR_BASE" \
            --start-point-hash "$PR_BASE_SHA" \
            --start-point-clone-thresholds \
            --start-point-reset \
            --testbed ubuntu-latest \
            --error-on-alert \
            --adapter rust_criterion \
            --github-actions '${{ secrets.GITHUB_TOKEN }}' \
            --ci-number "$PR_NUMBER" \
            --file "$BENCHMARK_RESULTS"
